<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>博衣こより配信一覧</title>

<style>
  body {
    background: #f5f7fa;
    font-family: sans-serif;
  }

  table {
    border-collapse: collapse;
    background: white;
    width: 100%;
  }

  th, td {
    border: 1px solid black;
  }

  th {
    background: #e3e8ef;
    padding: 6px;
    font-weight: bold;
  }
  td {
    padding: 6px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #e3e8ef;
  }

  .time-cell {
    text-align: right;
    white-space: nowrap;
  }

  .check-cell {
    text-align: center;
  }

  #controls {
    position: sticky;
    top: 0;
    z-index: 10;
    background: white;
    border-radius: 8px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    margin-bottom: 10px;
  }

  tr:hover {
    background: #f0f8ff;
  }
  
</style>

</head>
<body>

<h1>博衣こより🧪 配信アーカイブ</h1>

<div id="stats"></div>

<div id="controls">
  <input type="text" id="search" placeholder="タイトル検索">

  <select id="filterStatus">
    <option value="all">すべて</option>
    <option value="watched">視聴済み</option>
    <option value="unwatched">未視聴</option>
  </select>

  <select id="sort">
    <option value="new">公開日（新→旧）</option>
    <option value="old">公開日（旧→新）</option>
    <option value="title">タイトル順</option>
    <option value="long">時間（長い順）</option>
    <option value="short">時間（短い順）</option>
  </select>

  <!--
  <select id="playlistFilter">
    <option value="all">全再生リスト</option>
  </select>
  -->
  <div id="playlistFilterArea"></div>
  
    <details id="playlistBox">
      <summary>再生リスト選択</summary>
    
      <div id="playlistFilterArea"></div>
    
      <button id="playlistAll">全て✔</button>
      <button id="playlistClear">全て解除</button>
    </details>
    
    #playlistFilterArea {
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 5px;
    }

  
  <input type="date" id="dateFrom">
  ～
  <input type="date" id="dateTo">

  <button id="checkAll">表示を全部✔</button>
  <button id="uncheckAll">表示を全部解除</button>

  <button id="toTop">🔼</button>
  <button id="toBottom">🔽</button>

</div>

<p>配信一覧</p>

<table id="list">
  <thead>
    <tr>
      <th>公開日</th>
      <th>タイトル</th>
      <th>時間</th>
      <th>視聴済み</th>
      <th>再生リスト</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const url = "https://script.google.com/macros/s/AKfycbzLNPVR28em6L534Lk6FB9yKSJmAtkhJKqX6aFwREIgTtsKyCNPAcIZfeUoTsuUpKrkPA/exec";

let data = [];

// 日付
function formatDate(d){
  const date = new Date(d);

  const days = ["日","月","火","水","木","金","土"];

  const y = date.getFullYear();
  const m = date.getMonth()+1;
  const day = date.getDate();
  const w = days[date.getDay()];

  const h = date.getHours();
  const min = date.getMinutes().toString().padStart(2,'0');

  return `${y}/${m}/${day}(${w}) ${h}:${min}`;
}

// 時間
function formatDuration(sec){
  const h=Math.floor(sec/3600);
  const m=Math.floor((sec%3600)/60);
  const s=sec%60;
  return (h?`${h}時間`:"")+(m?`${m}分`:"")+(s?`${s}秒`:"");
}

// ✅ 統計
function updateStats(filtered){
  let total = filtered.length;
  let watched = 0;
  let totalSec=0;
  let watchedSec=0;

  filtered.forEach(x=>{
    totalSec += x.seconds;
    if(localStorage.getItem(x.videoId)==="true"){
      watched++;
      watchedSec += x.seconds;
    }
  });

  document.getElementById("stats").innerHTML = `
    <p>総動画：${total}本 / ${formatTotal(totalSec)}</p>
    <p>視聴済：${watched}本 / ${formatTotal(watchedSec)}</p>
    <p>視聴率：${total ? ((watched/total)*100).toFixed(1) : 0}%</p>
    <p>表示中：${filtered.length}件</p>
  `;
}

function formatTotal(sec){
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return `${h}時間${m}分`;
}

// ✅ 描画
function render(){
  const tbody = document.querySelector("#list tbody");
  tbody.innerHTML = "";

  const keyword = document.getElementById("search").value.toLowerCase();
  const status = document.getElementById("filterStatus").value;
  const sort = document.getElementById("sort").value;
  //const playlist = document.getElementById("playlistFilter").value;

  let filtered = data.filter(item=>{
    /*+
    if(!item.title.toLowerCase().includes(keyword)) return false;

    const watched = localStorage.getItem(item.videoId)==="true";

    if(status==="watched" && !watched) return false;
    if(status==="unwatched" && watched) return false;

    if(playlist!=="all" && item.playlist!==playlist) return false;

    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
  
    const itemDate = new Date(item.date);
  
    if(from && itemDate < new Date(from)) return false;
    if(to && itemDate > new Date(to)) return false;

    return true;
    */

    // ✅ 選択されてるプレイリスト取得
    const checkedPlaylists = Array.from(
      document.querySelectorAll("#playlistFilterArea input:checked")
    ).map(cb => cb.value);
    
    // ✅ 条件に追加
    if(checkedPlaylists.length > 0 && !checkedPlaylists.includes(item.playlist)){
      return false;
    }
    return true; 
  });

  // 表示件数を100件に制限
  // const limit = 100;
  // filtered = filtered.slice(0, limit);

  if(sort==="new") filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(sort==="old") filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(sort==="title") filtered.sort((a,b)=>a.title.localeCompare(b.title));
  if(sort==="long") filtered.sort((a,b)=>b.seconds-a.seconds);
  if(sort==="short") filtered.sort((a,b)=>a.seconds-b.seconds);

  filtered.forEach(item=>{
    const tr=document.createElement("tr");
    tr.dataset.id = item.videoId;

    const checked = localStorage.getItem(item.videoId)==="true";

    tr.innerHTML = `
      <td>${formatDate(item.date)}</td>
      <td><a href="https://www.youtube.com/watch?v=${item.videoId}" target="_blank">${item.title}</a></td>
      <td class="time-cell">${formatDuration(item.seconds)}</td>
      <td class="check-cell">
        <input type="checkbox" ${checked ? "checked":""}>
      </td>
      <td>${item.playlist}</td>
    `;

    if(checked){
      tr.style.background = "#e6ffe6";
    }

    const cb = tr.querySelector("input");

    cb.addEventListener("change", ()=>{
      localStorage.setItem(item.videoId, cb.checked);
      render();
    });

    tbody.appendChild(tr);
  });

  updateStats(filtered);
}

/* document.getElementById("stats").textContent = "読み込み中..."; */
document.getElementById("stats").innerHTML = `
  <p>📡 データ取得中...</p>
`;

  
// ✅ 初期読み込み
fetch(url)
  .then(r=>r.json())
  .then(json=>{
    data = json;

    // 再生リスト生成
    const set = new Set(data.map(x=>x.playlist));
    /*
    const sel = document.getElementById("playlistFilter");

    set.forEach(p=>{
      const opt=document.createElement("option");
      opt.value=p;
      opt.textContent=p;
      sel.appendChild(opt);
    */
    
    const area = document.getElementById("playlistFilterArea");
    
    set.forEach(p=>{
      const label = document.createElement("label");
      label.style.display = "block"
      
      label.innerHTML = `
        <input type="checkbox" value="${p}" checked>
        ${p}
      `;
    
    area.appendChild(label);

    });

    render();

    // イベント
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("filterStatus").addEventListener("change", render);
    document.getElementById("sort").addEventListener("change", render);
    //document.getElementById("playlistFilter").addEventListener("change", render);
    document.getElementById("dateFrom").addEventListener("change", render);
    document.getElementById("dateTo").addEventListener("change", render);
    document.getElementById("toTop").addEventListener("click", ()=>{
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
    
    document.getElementById("toBottom").addEventListener("click", ()=>{
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    });
    document.getElementById("sort").addEventListener("change", ()=>{
      localStorage.setItem("sort", document.getElementById("sort").value);
      render();
    });

    document.getElementById("checkAll").addEventListener("click", ()=>{
      document.querySelectorAll("#list tbody tr").forEach(tr=>{
        const id = tr.dataset.id;
        if(id){
          localStorage.setItem(id, true);
        }
      });
      render();
    });

    document.getElementById("uncheckAll").addEventListener("click", ()=>{
      document.querySelectorAll("#list tbody tr").forEach(tr=>{
        const id = tr.dataset.id;
        if(id){
          localStorage.setItem(id, false);
        }
      });
      render();
    });

  });
</script>

</body>
</html>
