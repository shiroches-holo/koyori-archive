<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>こよちゃん配信一覧</title>

<style>
  table, th, td {
    border: 1px solid black;
    border-collapse: collapse;
  }

  .time-cell {
    text-align: right;
    white-space: nowrap;
  }

  .check-cell {
    text-align: center;
  }
</style>
</head>
<div id="stats">
  <p>総動画：0本 / 0時間</p>
  <p>視聴済：0本 / 0時間</p>
  <p>視聴率：0%</p>
</div>
<body>
  <h1>博衣こより 配信アーカイブ</h1>

  <p>配信一覧（JSON取得）</p>

  <table border="1" id="list">
    <thead>
      <tr>
        <th>公開日</th>
        <th>タイトル</th>
        <th>時間</th>
        <th>視聴済み</th>
        <th>再生リスト</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const url = "https://script.google.com/macros/s/AKfycbzLNPVR28em6L534Lk6FB9yKSJmAtkhJKqX6aFwREIgTtsKyCNPAcIZfeUoTsuUpKrkPA/exec";

// 日付
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
}

// 時間
function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  let result = "";
  if (h > 0) result += `${h}時間`;
  if (m > 0) result += `${m}分`;
  if (s > 0) result += `${s}秒`;

  return result || "0秒";
}

// 合計時間
function formatTotal(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return `${h}時間${m}分`;
}

fetch(url)
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector("#list tbody");

    let totalCount = data.length;
    let totalSeconds = 0;

    let watchedCount = 0;
    let watchedSeconds = 0;

    data.forEach(item => {
      totalSeconds += item.seconds;

      const link = "https://www.youtube.com/watch?v=" + item.videoId;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${formatDate(item.date)}</td>
        <td><a href="${link}" target="_blank      <td class="time-cell">${formatDuration(item.seconds)}</td>
        <td class="check-cell">
          <input type="checkbox">
        </td>
        <td>${item.playlist}</td>
      `;

      const checkbox = tr.querySelector("input");
      const key = item.videoId;

      // 初期状態
      if (localStorage.getItem(key) === "true") {
        checkbox.checked = true;
        watchedCount++;
        watchedSeconds += item.seconds;
      }

      // 変更時
      checkbox.addEventListener("change", () => {
        localStorage.setItem(key, checkbox.checked);
        location.reload();
      });

      tbody.appendChild(tr);
    });

    // 視聴率
    const percent = totalCount > 0
      ? ((watchedCount / totalCount) * 100).toFixed(1)
      : 0;

    // 表示
    document.getElementById("stats").innerHTML = `
      <p>総動画：${totalCount}本 / ${formatTotal(totalSeconds)}</p>
      <p>視聴済：${watchedCount}本 / ${formatTotal(watchedSeconds)}</p>
      <p>視聴率：${percent}%</p>
    `;
  });
</script>

</body>
</html>
