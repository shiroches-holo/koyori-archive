<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>博衣こより配信一覧</title>

<style>
  /*
  body {
    background: #f5f7fa;
    font-family: sans-serif;
  }
  */
  body {
    background: #fff6f9; /* 少し薄くする */
  }

  table {
    background: white;
    border-radius: 10px;
    overflow: hidden;
  
    box-shadow: 0 6px 16px rgba(255, 160, 180, 0.2);
  }

  th, td {
    border: 1px solid black;
  }

  th {
    background: #e3e8ef;
    padding: 6px;
    font-weight: bold;
  }
  td {
    padding: 6px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #e3e8ef;
  }

  .time-cell {
    text-align: right;
    white-space: nowrap;
  }

  .check-cell {
    text-align: center;
  }

  #controls {
    position: sticky;
    top: 0;
    z-index: 10;
    background: white;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 15px;
    box-shadow: 0 4px 12px rgba(255, 160, 180, 0.2);
  }
  
  .controls-left {
    flex: 1;
  }

  .controls-right {
    text-align: right;
  }
  
  .controls-right button {
    margin-left: 6px;
  }
  
  .controls-right details {
    margin-top: 4px;
  }

  tr:hover {
    background: #fff0f5;
  }

  #playlistFilterArea {
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 5px;
    background: #fafafa;
  }
  
  header {
    background: linear-gradient(
      to right,
      #ffe4ec,
      #fff0f5
      /*
      135deg,
      #ffe4ec,
      #ffd6e5
      */
    );
  
    border-bottom: 2px solid #ff9fc1;
    padding: 12px 16px;
    margin-bottom: 15px;
  
    box-shadow: 0 3px 8px rgba(0,0,0,0.06);
  }

  /* 縦並び
  #stats {
    background: white;
    border-radius: 10px;
    padding: 12px;
    width: fit-content;
    margin-bottom: 10px;
  
    box-shadow: 0 4px 10px rgba(255, 160, 180, 0.2);
  }
  */

  /* 横並び */
  #stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  table {
    background: white;
    border-radius: 10px;
    overflow: hidden;
  
    box-shadow: 0 6px 16px rgba(255, 150, 180, 0.25);
  }

  .top-area {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  
  #controls {
    flex: 1;
    position: sticky;
    top: 0;
  }

  #stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  
  .stat-box {
    background: white;
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 140px;
  
    box-shadow: 0 4px 10px rgba(255, 150, 180, 0.2);

    animation: fadeUp 0.4s ease;  /*ページを開いた時にカードがポンと表示される*/
  }

  /*アニメーション*/
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  .stat-box .label {
    font-size: 12px;
    color: #777;
    margin-bottom: 4px;
  }
  
  .stat-box .value {
    font-size: 18px;
    font-weight: bold;
  }

  .stat-box:nth-child(5) {
    background: #ffe4ec;
  }

  .stat-box:hover {
    transform: translateY(-2px);
    transition: 0.2s;
  }

  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  
  .notice {
    font-size: 11px;
    color: #666;
  }
  
</style>

</head>

<body>

<header>
  <div class="header-inner">
    <h1>博衣こより🧪 アーカイブ視聴チェッカー</h1>
    <div class="notice">※非公式ファンメイドです</div>
  </div>
</header>

<!-- ✅ stats 横並びエリア -->
<div id="stats"></div>

<!-- ✅ controls は1個だけ -->
<div id="controls">
  <div class="controls-left">

    <input type="text" id="search" placeholder="タイトル検索">

    <select id="filterStatus">
      <option value="all">すべて</option>
      <option value="watched">視聴済み</option>
      <option value="unwatched">未視聴</option>
    </select>

    <select id="sort">
      <option value="new">公開日（新→旧）</option>
      <option value="old">公開日（旧→新）</option>
      <option value="title">タイトル順</option>
      <option value="long">時間（長い順）</option>
      <option value="short">時間（短い順）</option>
    </select>

    <input type="date" id="dateFrom">
    ～
    <input type="date" id="dateTo">

    <button id="checkAll">表示を全部✔</button>
    <button id="uncheckAll">表示を全部解除</button>

    <button id="toTop">🔼</button>
    <button id="toBottom">🔽</button>

    <button id="resetAll">条件リセット</button>

  </div>

  <div class="controls-right">
    <details>
      <summary>データ移行</summary>
      <button id="exportBtn">エクスポート</button>
      <button id="importBtn">インポート</button>
      <input type="file" id="importFile" style="display:none">
      <br>
      <button onclick="window.open('README.html')">使い方</button>
    </details>
  </div>
</div>

<details id="playlistBox">
  <summary>再生リスト選択</summary>
  <input type="text" id="playlistSearch" placeholder="再生リスト検索">
  <div id="playlistFilterArea"></div>

  <button id="playlistAll">全て✔</button>
  <button id="playlistClear">全て解除</button>
</details>

<p>配信一覧</p>

<table id="list">
  <thead>
    <tr>
      <th>公開日</th>
      <th>タイトル</th>
      <th>時間</th>
      <th>視聴済み</th>
      <th>再生リスト</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="loading">
  <div class="spinner"></div>
  読み込み中...
</div>

</body>

<script>
const url = "https://script.google.com/macros/s/AKfycby35nCN7uhqkTvMhTmb52O33xHxrpHEYkjXl0h8sCv34gxUenTfXbrAwzCs86kb05AR0w/exec";

let data = [];

// 日付
function formatDate(d){
  const date = new Date(d);

  const days = ["日","月","火","水","木","金","土"];

  const y = date.getFullYear();
  const m = date.getMonth()+1;
  const day = date.getDate();
  const w = days[date.getDay()];

  const h = date.getHours();
  const min = date.getMinutes().toString().padStart(2,'0');

  return `${y}/${m}/${day}(${w}) ${h}:${min}`;
}

// 時間
function formatDuration(sec){
  const h=Math.floor(sec/3600);
  const m=Math.floor((sec%3600)/60);
  const s=sec%60;
  return (h?`${h}時間`:"")+(m?`${m}分`:"")+(s?`${s}秒`:"");
}

// ✅ 統計
function updateStats(filtered){
  let total = filtered.length;
  let watched = 0;
  let totalSec = 0;
  let watchedSec = 0;

  filtered.forEach(x=>{
    totalSec += x.durationSec;

    if(localStorage.getItem(x.videoId)==="true"){
      watched++;
      watchedSec += x.durationSec;
    }
  });

  const rate = total ? ((watched/total)*100).toFixed(1) : 0;

  document.getElementById("stats").innerHTML = `
    <div class="stat-box">
      <div class="label">動画本数</div>
      <div class="value">${total}本</div>
    </div>

    <div class="stat-box">
      <div class="label">動画時間</div>
      <div class="value">${formatTotal(totalSec)}</div>
    </div>

    <div class="stat-box">
      <div class="label">視聴済</div>
      <div class="value">${watched}本</div>
    </div>

    <div class="stat-box">
      <div class="label">視聴時間</div>
      <div class="value">${formatTotal(watchedSec)}</div>
    </div>

    <div class="stat-box">
      <div class="label">達成率</div>
      <div class="value">${rate}%</div>
    </div>

    /*
    <div class="stat-box">
      <div class="label">表示件数</div>
      <div class="value">${filtered.length}件</div>
    </div>
    */
  `;
}

function formatTotal(sec){
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return `${h}時間${m}分`;
}

// ✅ 描画
function render(){
  const tbody = document.querySelector("#list tbody");
  tbody.innerHTML = "";

  const keyword = document.getElementById("search").value.toLowerCase();
  const playlistKeyword = document.getElementById("playlistSearch").value.toLowerCase();
  const status = document.getElementById("filterStatus").value;
  const sort = document.getElementById("sort").value;
  //const playlist = document.getElementById("playlistFilter").value;

  let filtered = data.filter(item => {

    // 🔍 タイトル検索
    if(keyword && !item.title.toLowerCase().includes(keyword)){
      return false;
    }
  
    // ✅ チェックボックス（これだけで再生リスト判定）
    const checkedPlaylists = Array.from(
      document.querySelectorAll("#playlistFilterArea input:checked")
    ).map(cb => cb.value);
  
    if(checkedPlaylists.length === 0) return false;
    if(!checkedPlaylists.includes(item.playlistName)) return false;
  
    // ✅ 視聴状態
    const watched = localStorage.getItem(item.videoId) === "true";
    if(status === "watched" && !watched) return false;
    if(status === "unwatched" && watched) return false;
  
    // ✅ 日付
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    const itemDate = new Date(item.publishedAt);
  
    if(from && itemDate < new Date(from)) return false;
    if(to && itemDate > new Date(to)) return false;
  
    return true;
  });

  // 表示件数を100件に制限
  // const limit = 100;
  // filtered = filtered.slice(0, limit);

  if(sort==="new") filtered.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
  if(sort==="old") filtered.sort((a,b)=>new Date(a.publishedAt)-new Date(b.publishedAt));
  if(sort==="long") filtered.sort((a,b)=>b.durationSec-a.durationSec);
  if(sort==="short") filtered.sort((a,b)=>a.durationSec-b.durationSec);

  filtered.forEach(item=>{
    const tr=document.createElement("tr");
    tr.dataset.id = item.videoId;

    const checked = localStorage.getItem(item.videoId)==="true";

    tr.innerHTML = `
    <td>${formatDate(item.publishedAt)}</td>
    <td>
      <a href="https://www.youtube.com/watch?v=${item.videoId}" target="_blank">
        ${item.title}
      </a>
    </td>
    <td class="time-cell">${formatDuration(item.durationSec)}</td>
    <td class="check-cell">
      <input type="checkbox" ${checked ? "checked":""}>
    </td>
    <td>
      ${
        item.playlistUrl
          ? `<a href="${item.playlistUrl}" target="_blank">${item.playlistName}</a>`
          : item.playlistName
      }
    </td>
  `;
    if(checked){
      tr.style.background = "#e6ffe6";
    }

    const cb = tr.querySelector("input");
    
    cb.addEventListener("change", ()=>{
      localStorage.setItem(item.videoId, cb.checked);
      render();
    });

    tbody.appendChild(tr);
  });

  updateStats(filtered);
}

/* document.getElementById("stats").textContent = "読み込み中..."; */
document.getElementById("stats").innerHTML = `
  <div style="
    padding:20px;
    text-align:center;
    font-size:18px;
  ">
    <div style="
      margin:0 auto 10px;
      width:30px;
      height:30px;
      border:4px solid #ccc;
      border-top:4px solid #4cafef;
      border-radius:50%;
      animation:spin 1s linear infinite;
    "></div>
    読み込み中...
  </div>
`;

const style = document.createElement("style");
style.innerHTML = `
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
`;
document.head.appendChild(style);
  
// ✅ 初期読み込み
fetch(url)
  .then(r=>r.json())
  .then(json=>{
    console.log(json); // ←ここ追加！！
    data = json;

    // 再生リスト生成
    const set = new Set(data.map(x => x.playlistName));
    const area = document.getElementById("playlistFilterArea");
    
    set.forEach(p=>{
      const label = document.createElement("label");
      label.style.display = "block"
      
      label.innerHTML = `
        <input type="checkbox" value="${p}" checked>
        ${p}
      `;

      const cb = label.querySelector("input");
  
      cb.addEventListener("change", render);

    area.appendChild(label);

    });

    render();

    // イベント
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("playlistSearch").addEventListener("input", ()=>{
      const keyword = document.getElementById("playlistSearch").value.toLowerCase();
    
      document.querySelectorAll("#playlistFilterArea label").forEach(label=>{
        const text = label.textContent.toLowerCase();
    
        if(!keyword || text.includes(keyword)){
          label.style.display = "block";
        } else {
          label.style.display = "none";
        }
      });
    });
    document.getElementById("filterStatus").addEventListener("change", render);
    document.getElementById("sort").addEventListener("change", render);
    //document.getElementById("playlistFilter").addEventListener("change", render);
    document.getElementById("dateFrom").addEventListener("change", render);
    document.getElementById("dateTo").addEventListener("change", render);
    document.getElementById("toTop").addEventListener("click", ()=>{
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
    
    document.getElementById("toBottom").addEventListener("click", ()=>{
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    });
    document.getElementById("sort").addEventListener("change", ()=>{
      localStorage.setItem("sort", document.getElementById("sort").value);
      render();
    });

    document.getElementById("checkAll").addEventListener("click", ()=>{
      document.querySelectorAll("#list tbody tr").forEach(tr=>{
        const id = tr.dataset.id;
        if(id){
          localStorage.setItem(id, true);
        }
      });
      render();
    });

    document.getElementById("uncheckAll").addEventListener("click", ()=>{
      document.querySelectorAll("#list tbody tr").forEach(tr=>{
        const id = tr.dataset.id;
        if(id){
          localStorage.setItem(id, false);
        }
      });
      render();
    });

    document.getElementById("playlistAll").addEventListener("click", ()=>{
      document.querySelectorAll("#playlistFilterArea input").forEach(cb=>{
        cb.checked = true;
      });
      render();
    });
    
    document.getElementById("playlistClear").addEventListener("click", ()=>{
      document.querySelectorAll("#playlistFilterArea input").forEach(cb=>{
        cb.checked = false;
      });
      render();
    });
    
    document.getElementById("resetAll").addEventListener("click", ()=>{
      // 検索
      document.getElementById("search").value = "";
      document.getElementById("playlistSearch").value = "";
    
      // 状態
      document.getElementById("filterStatus").value = "all";
    
      // ソート
      document.getElementById("sort").value = "new";
    
      // 日付
      document.getElementById("dateFrom").value = "";
      document.getElementById("dateTo").value = "";
    
      // 再生リスト全部ON
      document.querySelectorAll("#playlistFilterArea input").forEach(cb=>{
        cb.checked = true;
      });
    
      render();
    });
    
    /* --- データ移行 --- */
    document.getElementById("exportBtn").onclick=()=>{
      const obj={};
      Object.keys(localStorage).forEach(k=>obj[k]=localStorage.getItem(k));
    
      const blob=new Blob([JSON.stringify(obj)],{type:"application/json"});
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="data.json";
      a.click();
    };
    
    document.getElementById("importBtn").onclick = () => {
      document.getElementById("importFile").click();
    };

  });
</script>

</body>
</html>
