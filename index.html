<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>こよちゃん配信一覧</title>
</head>
<body>
  <h1>博衣こより 配信アーカイブ</h1>

  <p>配信一覧（JSON取得）</p>

  <table border="1" id="list">
    <thead>
      <tr>
        <th>公開日</th>
        <th>タイトル</th>
        <th>再生リスト</th>
        <th>時間</th>
        <th>リンク</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const url = "https://script.google.com/macros/s/AKfycbzLNPVR28em6L534Lk6FB9yKSJmAtkhJKqX6aFwREIgTtsKyCNPAcIZfeUoTsuUpKrkPA/exec";

fetch(url)
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector("#list tbody");

    data.forEach(item => {
      const link = "https://www.youtube.com/watch?v=" + item.videoId;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${item.date}</td>
        <td>${item.title}</td>
        <td>${item.playlist}</td>
        <td>${item.duration}</td>
        <td><a href="${link}" target `;

      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
