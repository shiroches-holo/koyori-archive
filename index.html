<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>こよちゃん配信一覧</title>

<style>
  table, th, td {
    border: 1px solid black;
    border-collapse: collapse;
  }

  .time-cell {
    text-align: right;
    white-space: nowrap;
  }

  .check-cell {
    text-align: center;
  }
</style>
</head>
<body>
  <h1>博衣こより 配信アーカイブ</h1>

  <p>配信一覧（JSON取得）</p>

  <table border="1" id="list">
    <thead>
      <tr>
        <th>公開日</th>
        <th>タイトル</th>
        <th>時間</th>
        <th>視聴済み</th>
        <th>再生リスト</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const url = "https://script.google.com/macros/s/AKfycbzLNPVR28em6L534Lk6FB9yKSJmAtkhJKqX6aFwREIgTtsKyCNPAcIZfeUoTsuUpKrkPA/exec";

// 日付フォーマット
function formatDate(dateStr) {
  const d = new Date(dateStr);

  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const h = d.getHours();
  const min = d.getMinutes().toString().padStart(2, '0');

  return `${y}/${m}/${day} ${h}:${min}`;
}

// 再生時間フォーマット
function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  let result = "";

  if (h > 0) result += `${h}時間`;
  if (m > 0) result += `${m}分`;
  if (s > 0) result += `${s}秒`;

  return result || "0秒";
}

fetch(url)
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector("#list tbody");

    data.forEach(item => {
      const link = "https://www.youtube.com/watch?v=" + item.videoId;
    
      const tr = document.createElement("tr");
    

    tr.innerHTML = `
      <td>${formatDate(item.date)}</td>
      <td><a href="${link}" target="_blank">${item.title}</a></td>
      <td class="time-cell">${formatDuration(item.seconds)}</td>
      <td class="check-cell">
        <input type="checkbox">
      </td>
      <td>${item.playlist}</td>
    `;
    
      const checkbox = tr.querySelector("input");
      const key = item.videoId;
    
      // 保存状態を復元
      if (localStorage.getItem(key) === "true") {
        checkbox.checked = true;
      }
    
      // 状態変更時に保存
      checkbox.addEventListener("change", () => {
        localStorage.setItem(key, checkbox.checked);
      });
    
      tbody.appendChild(tr);
    });
    
  });
</script>

</body>
</html>
